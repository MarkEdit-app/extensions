<article class="card">
  <h2>{{NAME}} <span class="ver">v{{VERSION}}</span>{{SCHEME}}</h2>
  {{PREVIEW}}
  <p class="desc">{{DESCRIPTION}}</p>
  <p class="meta">by {{AUTHOR}} &middot; <code>{{ID}}</code></p>
  <div class="actions">
    <a class="btn" href="{{DEEP_LINK}}"><span class="icon icon-install"></span>Add to MarkEdit</a>
    <a class="btn" href="{{HOMEPAGE}}" target="_blank" rel="noopener"><span class="icon icon-link"></span>Homepage</a>
  </div>
</article>
