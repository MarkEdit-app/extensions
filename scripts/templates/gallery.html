<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MarkEdit Extensions</title>
  <style> {{STYLES}} </style>
</head>
<body>
  <header>
    <h1>MarkEdit Extensions</h1>
    <p>Curated, reviewed extensions for <a href="https://github.com/MarkEdit-app/MarkEdit">MarkEdit</a>. {{COUNT}} available.</p>
    {{NAV}}
  </header>

  <main> {{CARDS}} </main>

  <footer>
    Generated <time id="genDate" datetime="{{GENERATED_ISO}}">{{GENERATED_UTC}}</time>
    from <a href="https://github.com/MarkEdit-app/extensions">extensions</a>
    &middot; <a href="https://raw.githubusercontent.com/MarkEdit-app/extensions/main/index.json">index.json</a>
  </footer>

  <script>
    // Re-render the timestamp in the viewer's own locale and timezone
    (() => {
      const element = document.getElementById('genDate');
      const date = element && new Date(element.dateTime);
      if (date && !Number.isNaN(date.getTime())) {
        element.textContent = date.toLocaleString(undefined, { dateStyle: 'long', timeStyle: 'short' });
      }
    })();

    // Follow the browser color scheme for Light/Dark previews until the user picks one
    (() => {
      const query = matchMedia('(prefers-color-scheme: dark)');
      const groups = new Map();

      document.querySelectorAll('.preview .tab-input').forEach((input) => {
        const group = groups.get(input.name) ?? {};
        group[input.classList.contains('dark') ? 'dark' : 'light'] = input;
        groups.set(input.name, group);
        input.addEventListener('change', () => { group.touched = true; });
      });

      const apply = () => {
        groups.forEach((group) => {
          if (group.touched) {
            return;
          }

          const target = query.matches ? group.dark : group.light;
          if (target && !target.checked) {
            target.checked = true;
          }
        });
      };

      apply();
      query.addEventListener('change', apply);
    })();
  </script>
</body>
</html>
