<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MarkEdit Extensions</title>
  <style> {{STYLES}} </style>
</head>
<body>
  <header>
    <h1>MarkEdit Extensions</h1>
    <p>Curated, reviewed extensions for <a href="https://github.com/MarkEdit-app/MarkEdit">MarkEdit</a>. {{COUNT}} available.</p>
  </header>

  <main> {{CARDS}} </main>

  <footer>
    Generated <time id="genDate" datetime="{{GENERATED_ISO}}">{{GENERATED_UTC}}</time>
    from <a href="https://github.com/MarkEdit-app/extension-registry">extension-registry</a>
    &middot; <a href="https://raw.githubusercontent.com/MarkEdit-app/extension-registry/main/index.json">index.json</a>
  </footer>

  <script>
    // Re-render the timestamp in the viewer's own locale and timezone
    (() => {
      const element = document.getElementById('genDate');
      const date = element && new Date(element.dateTime);
      if (date && !Number.isNaN(date.getTime())) {
        element.textContent = date.toLocaleString(undefined, { dateStyle: 'long', timeStyle: 'short' });
      }
    })();
  </script>
</body>
</html>
