<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MarkEdit Extensions</title>
  <link rel="icon" type="image/svg+xml" href="favicons/favicon.svg">
  <link rel="alternate icon" type="image/png" href="favicons/favicon.png">
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <header>
    <div class="header-top">
      <h1><picture class="logo"><source media="(prefers-color-scheme: dark)" srcset="https://raw.githubusercontent.com/MarkEdit-app/MarkEdit/main/Icon-dark.png"><img src="https://raw.githubusercontent.com/MarkEdit-app/MarkEdit/main/Icon.png" alt="" width="40" height="40" decoding="async"></picture>MarkEdit Extensions</h1>
      {{NAV}}
    </div>
    <p>Curated, reviewed extensions for <a href="https://github.com/MarkEdit-app/MarkEdit">MarkEdit</a>.</p>
  </header>
  <aside class="alert-region">{{NOTE}}</aside>
  <main>{{CARDS}}</main>
  <footer>
    Generated <time id="genDate" datetime="{{GENERATED_ISO}}">{{GENERATED_UTC}}</time>
    from <a href="https://github.com/MarkEdit-app/extensions">extensions</a>
    &middot; <a href="https://raw.githubusercontent.com/MarkEdit-app/extensions/main/index.json">index.json</a>
  </footer>
  <script src="index.js"></script>
</body>
</html>
